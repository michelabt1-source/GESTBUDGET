<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GCS | Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; height: 100vh; display: flex; align-items: center; }
        .login-card { border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .login-header { background: #0b1a31; color: white; padding: 40px; text-align: center; }
        .btn-success { background-color: #10b981; border: none; padding: 12px; font-weight: 600; }
        .form-control { padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card">
                    <div class="login-header">
                        <i class="fas fa-chart-pie fa-3x mb-3 text-success"></i>
                        <h4 class="fw-bold">GCS BUDGET</h4>
                    </div>
                    <div class="card-body p-5">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Identifiant</label>
                                <input type="text" name="username" class="form-control" placeholder="ex: nom_utilisateur" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-bold">Mot de passe</label>
                                <input type="password" name="password" class="form-control" placeholder="...." required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 shadow-sm">
                                Se connecter <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                        </form>
                    </div>
                </div>
                <p class="text-center mt-4 text-muted small">&copy; 2026 DevGlobComSol</p>
            </div>
        </div>
    </div>
</body>
</html>
